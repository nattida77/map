<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แผนที่หอพัก มทร.รัตนโกสินทร์ ศาลายา</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg1:#1c2233;--bg2:#232b3e;--bg3:#2a3450;
  --acc:#5b8dee;--acc2:#4ecdc4;--acc3:#f7c59f;
  --text1:#e8edf5;--text2:#9aa8c0;--text3:#5a6680;
  --border:rgba(255,255,255,.07);
  --card:rgba(255,255,255,.04);
  --radius:12px;
}
html,body{height:100%;font-family:'IBM Plex Sans Thai','IBM Plex Sans',sans-serif;background:var(--bg1);color:var(--text1);overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}

/* ── Header ── */
#hdr{background:var(--bg1);padding:12px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{width:36px;height:36px;background:var(--acc);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;box-shadow:0 2px 12px rgba(91,141,238,.3)}
#hdr h1{font-size:14px;font-weight:600;color:var(--text1);letter-spacing:.01em}
#hdr p{font-size:11px;color:var(--text3);margin-top:1px}
.hstats{margin-left:auto;display:flex;gap:7px}
.spill{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:11px;color:var(--text2);white-space:nowrap}

/* ── Filter bar ── */
#fbar{background:var(--bg1);padding:8px 18px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--border);flex-shrink:0}
.fb{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:11px;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .18s}
.fb:hover{border-color:rgba(255,255,255,.18);color:var(--text2)}
.fb.on{color:#fff}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── Map ── */
#mwrap{position:relative;flex:1}
#map{width:100%;height:100%}
.leaflet-container{font-family:inherit!important}
.leaflet-control-zoom a{background:var(--bg2)!important;color:var(--text2)!important;border-color:var(--border)!important}
.leaflet-control-zoom a:hover{background:var(--bg3)!important;color:var(--text1)!important}

/* ── Legend ── */
#lgd{position:absolute;bottom:24px;left:12px;background:rgba(28,34,51,.92);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:var(--radius);padding:9px 13px;z-index:900}
#lgd h4{font-size:9px;color:var(--text3);letter-spacing:.7px;text-transform:uppercase;margin-bottom:7px}
.li{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:11px;color:var(--text2)}
.li:last-child{margin-bottom:0}
.ldot{width:9px;height:9px;border-radius:50%}
.lsq{width:10px;height:10px;border-radius:3px}

/* ── Radius ── */
#rbtn{position:absolute;bottom:24px;right:52px;background:rgba(28,34,51,.92);backdrop-filter:blur(10px);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:6px 11px;font-size:11px;font-family:inherit;cursor:pointer;z-index:900;transition:all .18s}
#rbtn:hover,#rbtn.on{background:rgba(91,141,238,.15);border-color:var(--acc);color:var(--text1)}

/* ── MODAL overlay ── */
#mover{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#mover.open{display:flex;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── Modal box ── */
#mdl{background:var(--bg2);border-radius:18px;width:420px;max-width:95vw;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.5);border:1px solid var(--border);animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:none;opacity:1}}

/* Image */
.mimg-wrap{position:relative;flex-shrink:0}
.mimg{width:100%;height:175px;object-fit:cover;display:block;background:var(--bg3)}
.close-x{position:absolute;top:10px;right:10px;width:28px;height:28px;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.15);border-radius:50%;color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.close-x:hover{background:rgba(220,60,60,.7)}
.mimg-badge{position:absolute;bottom:10px;left:10px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1)}

/* Tabs */
.mtabs{display:flex;background:var(--bg1);border-bottom:1px solid var(--border);flex-shrink:0}
.mtab{flex:1;padding:9px 0;font-size:11px;font-family:inherit;background:transparent;border:none;color:var(--text3);cursor:pointer;transition:all .15s;border-bottom:2px solid transparent;margin-bottom:-1px}
.mtab.on{color:var(--acc);border-bottom-color:var(--acc)}
.mtab:hover:not(.on){color:var(--text2)}

/* Body */
.mbody{overflow-y:auto;flex:1;padding:14px 16px}
.mbody::-webkit-scrollbar{width:3px}
.mbody::-webkit-scrollbar-thumb{background:var(--text3);border-radius:3px}

/* Info */
.mname{font-size:16px;font-weight:600;color:var(--text1);margin-bottom:3px}
.maddr{font-size:11px;color:var(--text3);margin-bottom:8px;line-height:1.5}
.mrating{display:flex;align-items:center;gap:6px;font-size:12px;margin-bottom:12px}
.stars{color:#f5c842;font-weight:700}
.rcnt{color:var(--text3)}

/* Stat grid */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:11px}
.scard{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px 11px}
.slbl{font-size:9px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.sval{font-size:13px;font-weight:600;color:var(--text1);line-height:1.2}
.ssub{font-size:10px;color:var(--text3)}

/* Rows */
.irow{display:flex;align-items:flex-start;gap:8px;font-size:11px;color:var(--text2);padding:5px 0;border-bottom:1px solid var(--border)}
.irow:last-child{border:none}
.ilbl{color:var(--text3);min-width:72px;flex-shrink:0}
.ival{color:var(--text2);line-height:1.4}

/* Tags */
.tags{display:flex;flex-wrap:wrap;gap:4px;margin:7px 0}
.tag{border-radius:20px;padding:3px 8px;font-size:10px;background:var(--card);border:1px solid var(--border);color:var(--text2)}
.sec-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;margin-top:11px}
.sec-lbl:first-child{margin-top:0}

/* Grab box */
.grab-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:10px}
.grab-head{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.grab-logo{width:28px;height:28px;background:#00b14f;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.grab-title{font-size:12px;font-weight:600;color:var(--text1)}
.grab-sub{font-size:10px;color:var(--text3)}
.grab-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)}
.grab-row:last-child{border:none}
.grab-type{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text2)}
.grab-icon{font-size:16px}
.grab-price{font-size:13px;font-weight:700;color:var(--acc)}
.grab-note{font-size:10px;color:var(--text3)}

/* Bus */
.busitem{display:flex;align-items:flex-start;gap:9px;padding:8px 10px;background:var(--card);border:1px solid var(--border);border-radius:9px;margin-bottom:6px}
.busnum{border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;min-width:44px;text-align:center;flex-shrink:0;margin-top:1px}
.busroute{font-size:11px;color:var(--text2);line-height:1.4}
.busfreq{font-size:10px;color:var(--text3);margin-top:2px}

/* Reviews */
.revcard{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 11px;margin-bottom:7px}
.revhead{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.avt{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.rvname{font-size:11px;font-weight:600;color:var(--text1)}
.rvdate{font-size:10px;color:var(--text3)}
.rvstars{font-size:11px;color:#f5c842;margin-bottom:3px}
.rvtext{font-size:11px;color:var(--text2);line-height:1.6}

/* Tab panels */
.tpanel{display:none}.tpanel.on{display:block}

  /* ── Gallery ── */
  .mimg-wrap{position:relative;flex-shrink:0;height:200px;background:#151e2d;overflow:hidden}
  .gal-outer{position:relative;width:100%;height:200px;overflow:hidden}
  .gal-track{display:flex;height:200px;transition:transform .3s ease}
  .gal-item{flex:0 0 100%;height:200px;overflow:hidden}
  .gal-item img{width:100%;height:200px;object-fit:cover;display:block}
  .gal-btn{position:absolute;top:50%;transform:translateY(-50%);
    width:38px;height:38px;border-radius:50%;
    background:rgba(0,0,0,.6);border:1.5px solid rgba(255,255,255,.3);
    color:#fff;font-size:22px;cursor:pointer;z-index:30;
    display:flex;align-items:center;justify-content:center;
    user-select:none;line-height:1}
  .gal-btn:hover{background:rgba(0,0,0,.8)}
  .gal-prev{left:8px}.gal-next{right:8px}
  .gal-dots{position:absolute;bottom:32px;left:0;right:0;
    display:flex;justify-content:center;gap:5px;z-index:30}
  .gdot{width:6px;height:6px;border-radius:50%;
    background:rgba(255,255,255,.4);cursor:pointer;transition:all .2s}
  .gdot.on{background:#fff;width:16px;border-radius:3px}
  .gal-count{position:absolute;bottom:10px;right:10px;
    background:rgba(0,0,0,.55);border-radius:20px;
    padding:2px 9px;font-size:10px;color:rgba(255,255,255,.9);z-index:30}
  .gal-gmaps{position:absolute;bottom:10px;left:10px;z-index:30;
    background:rgba(0,0,0,.55);border-radius:20px;
    padding:3px 10px;font-size:10px;color:#fff;
    text-decoration:none;display:flex;align-items:center;gap:4px}
  .gal-gmaps:hover{background:rgba(66,133,244,.8)}

  .gmaps-btn{position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,.5);
    color:#fff;font-size:10px;padding:3px 9px;border-radius:20px;
    text-decoration:none;z-index:10;backdrop-filter:blur(4px)}
  .gmaps-btn:hover{background:rgba(66,133,244,.8)}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="logo">🎓</div>
    <div>
      <h1>มทร.รัตนโกสินทร์ ศาลายา — แผนที่หอพัก</h1>
      <p>อ.พุทธมณฑล · คลิก PIN เพื่อดูรายละเอียด รีวิว ราคา Grab และการเดินทาง</p>
    </div>
    <div class="hstats">
      <span class="spill">🏠 19 ที่พัก</span>
      <span class="spill">🚌 6 สายรถ</span>
      <span class="spill">🟢 Grab ราคา</span>
    </div>
  </div>

  <div id="fbar">
    <button class="fb on" style="background:var(--acc);border-color:var(--acc)" onclick="setF('all',this)"><span class="dot" style="background:#fff"></span>ทั้งหมด</button>
    <button class="fb" onclick="setF('dorm',this)"><span class="dot" style="background:#f7a55b"></span>หอพัก/อพาร์ทเม้นท์</button>
    <button class="fb" onclick="setF('condo',this)"><span class="dot" style="background:#a78bfa"></span>คอนโด</button>
    <button class="fb" onclick="setF('laundry',this)"><span class="dot" style="background:#4ecdc4"></span>ร้านซักรีด</button>
    <button class="fb" onclick="setF('shop',this)"><span class="dot" style="background:#6ee7b7"></span>ร้านค้า/ห้าง</button>
    <button class="fb" onclick="setF('hospital',this)"><span class="dot" style="background:#f87171"></span>โรงพยาบาล</button>
    <button class="fb" onclick="setF('bus',this)"><span class="dot" style="background:#fcd34d"></span>ป้ายรถ/วิน</button>
  </div>

  <div id="mwrap">
    <div id="map"></div>
    <div id="lgd">
      <h4>สัญลักษณ์</h4>
      <div class="li"><div class="lsq" style="background:#5b8dee"></div>มหาวิทยาลัย</div>
      <div class="li"><div class="ldot" style="background:#f7a55b"></div>หอพัก/อพาร์ทเม้นท์</div>
      <div class="li"><div class="ldot" style="background:#a78bfa"></div>คอนโด</div>
      <div class="li"><div class="ldot" style="background:#4ecdc4"></div>ร้านซักรีด</div>
      <div class="li"><div class="ldot" style="background:#6ee7b7"></div>ร้านค้า/ห้าง</div>
      <div class="li"><div class="ldot" style="background:#f87171"></div>โรงพยาบาล</div>
      <div class="li"><div class="ldot" style="background:#fcd34d"></div>ป้ายรถ/วิน</div>
    </div>
    <button id="rbtn" onclick="togRad()">📏 รัศมี 1 กม.</button>
  </div>
</div>

<!-- MODAL -->
<div id="mover" onclick="closeMdlOv(event)">
  <div id="mdl">
    <div class="mimg-wrap" id="mimgwrap"></div>
    <div class="mtabs" id="mtabs"></div>
    <div class="mbody" id="mbody"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ─── SOUND (Web Audio API — ต้องเรียกหลัง user gesture) ────
let _ac=null;
function getAC(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac;}
function beep(freq,dur,type='sine',vol=0.15,freqEnd){
  try{
    const ac=getAC();
    if(ac.state==='suspended') ac.resume();
    const o=ac.createOscillator(), g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type=type;
    o.frequency.setValueAtTime(freq,ac.currentTime);
    if(freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd,ac.currentTime+dur);
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+dur);
    o.start(ac.currentTime);o.stop(ac.currentTime+dur+0.02);
  }catch(e){console.log('sound err',e);}
}
function sOpen(){beep(440,.08,'sine',.12,700);setTimeout(()=>beep(700,.12,'sine',.08),90);}
function sClose(){beep(500,.06,'sine',.1,340);}
function sTab(){beep(600,.08,'sine',.08);}
function sFilter(){beep(380,.06,'square',.06);}
function sSlide(){beep(520,.05,'sine',.05);}

// ─── COLOR MAP ───────────────────────────────────────────────
const C={uni:'#5b8dee',dorm:'#f7a55b',condo:'#a78bfa',laundry:'#4ecdc4',shop:'#6ee7b7',hospital:'#f87171',bus:'#fcd34d'};
const ULT=13.7959,ULG=100.3005;

// ─── GRAB PRICE CALCULATOR ───────────────────────────────────
// Base rates (THB): moto 20+8/km, car 40+12/km (approx Grab Thailand 2024)
function grabPrice(distKm){
  const moto=Math.round(20+8*distKm);
  const car=Math.round(45+14*distKm);
  return {
    moto:{min:Math.max(20,moto-5),max:moto+8},
    car:{min:Math.max(45,car-10),max:car+15}
  };
}
function grabHTML(distKm){
  if(!distKm||distKm<=0) return '';
  const g=grabPrice(distKm);
  return `
  <div class="sec-lbl">🟢 ราคา Grab โดยประมาณ</div>
  <div class="grab-box">
    <div class="grab-head">
      <div class="grab-logo">G</div>
      <div><div class="grab-title">Grab จากมหาวิทยาลัย</div>
      <div class="grab-sub">ระยะทาง ~${distKm} กม. · ราคาขึ้นอยู่กับช่วงเวลา</div></div>
    </div>
    <div class="grab-row">
      <div class="grab-type"><span class="grab-icon">🛵</span><span>Grab Bike (มอเตอร์ไซค์)</span></div>
      <div style="text-align:right"><div class="grab-price">${g.moto.min}–${g.moto.max} บาท</div><div class="grab-note">~${Math.round(distKm/0.3)} นาที</div></div>
    </div>
    <div class="grab-row">
      <div class="grab-type"><span class="grab-icon">🚗</span><span>GrabCar (รถยนต์)</span></div>
      <div style="text-align:right"><div class="grab-price">${g.car.min}–${g.car.max} บาท</div><div class="grab-note">~${Math.round(distKm/0.5)} นาที</div></div>
    </div>
    <div class="grab-row" style="border:none;padding-top:6px">
      <div style="font-size:10px;color:var(--text3)">⚠️ ราคาอาจเปลี่ยนแปลงตาม surge pricing ในชั่วโมงเร่งด่วน</div>
    </div>
  </div>`;
}

// ─── MAP ─────────────────────────────────────────────────────
const map=L.map('map',{center:[ULT,ULG],zoom:15,zoomControl:false});
L.control.zoom({position:'bottomright'}).addTo(map);
// Light-warm map tile ให้เข้ากับธีม
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  attribution:'© OpenStreetMap © CARTO',subdomains:'abcd',maxZoom:19
}).addTo(map);

// ─── MARKERS ─────────────────────────────────────────────────
let allMk=[];
DATA.forEach(p=>{
  const col=C[p.type]||'#9aa8c0';
  const isUni=p.type==='uni',isBus=p.type==='bus';
  const sz=isUni?46:isBus?30:36;
  const br=isUni?'10px':'50%';
  const fs=isUni?'20px':'15px';
  const icon=L.divIcon({
    html:`<div style="width:${sz}px;height:${sz}px;background:${col};border:2.5px solid #fff;border-radius:${br};display:flex;align-items:center;justify-content:center;font-size:${fs};box-shadow:0 3px 10px rgba(0,0,0,.25);cursor:pointer">${p.emoji}</div>`,
    className:'',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2],popupAnchor:[0,-sz/2-4]
  });
  const mk=L.marker([p.lat,p.lng],{icon}).on('click',()=>{
    sOpen(); openMdl(p);
  }).addTo(map);
  allMk.push({mk,type:p.type});
});

// ─── FILTER ──────────────────────────────────────────────────
function setF(type,btn){
  sFilter();
  document.querySelectorAll('.fb').forEach(b=>{
    b.classList.remove('on');
    b.style.background='transparent';
    b.style.borderColor='var(--border)';
    b.style.color='var(--text3)';
  });
  btn.classList.add('on');
  const dc=btn.querySelector('.dot').style.background;
  btn.style.background=type==='all'?'var(--acc)':dc;
  btn.style.borderColor=type==='all'?'var(--acc)':dc;
  btn.style.color='#fff';
  allMk.forEach(({mk,type:t})=>{
    const show=type==='all'||(type==='dorm'&&(t==='dorm'||t==='uni'))||t===type;
    show?map.addLayer(mk):map.removeLayer(mk);
  });
}

// ─── RADIUS ──────────────────────────────────────────────────
let rcs=[],rOn=false;
function togRad(){
  const btn=document.getElementById('rbtn');
  if(rOn){rcs.forEach(c=>map.removeLayer(c));rcs=[];btn.classList.remove('on');btn.textContent='📏 รัศมี 1 กม.';rOn=false;}
  else{
    [[500,'#f7a55b'],[1000,'#5b8dee'],[2000,'#6ee7b7']].forEach(([r,col])=>{
      const c=L.circle([ULT,ULG],{radius:r,color:col,weight:1.5,fillColor:col,fillOpacity:0.05,dashArray:'5,5'}).addTo(map);
      const lb=L.divIcon({html:`<div style="color:${col};font-size:11px;font-weight:700;text-shadow:0 1px 3px rgba(255,255,255,.8)">${r>=1000?r/1000+' กม.':r+' ม.'}</div>`,className:'',iconSize:[50,16],iconAnchor:[25,8]});
      L.marker([ULT+r*0.0000089,ULG],{icon:lb,interactive:false}).addTo(map);
      rcs.push(c);
    });
    btn.classList.add('on');btn.textContent='✕ ซ่อนรัศมี';rOn=true;
  }
}

// ─── MODAL ───────────────────────────────────────────────────
function openMdl(p){
  const bc=p.bc||'#f7a55b';
  // ── รูปภาพ ──
  const imgUrl = p.img || '';
  const gmapsUrl = 'https://maps.google.com/maps?q=' + encodeURIComponent(p.name + ' ศาลายา');
  document.getElementById('mimgwrap').innerHTML =
    '<img class="mimg" src="' + imgUrl + '" alt="' + p.name + '" loading="eager" onerror="this.style.opacity=0.3">'
    + '<div class="mimg-badge" style="background:' + bc + '22;color:' + bc + '">' + p.badge + '</div>'
    + '<a href="' + gmapsUrl + '" target="_blank" class="gmaps-btn">📍 Google Maps</a>'
    + '<button class="close-x" onclick="closeMdlBtn()">&#x2715;</button>';

  document.getElementById('mtabs').innerHTML=
    ['📋 ข้อมูล','🟢 Grab & รถ','⭐ รีวิว'].map((t,i)=>
      `<button class="mtab${i===0?' on':''}" onclick="swTab(${i},this)">${t}</button>`
    ).join('');

  // Panel 0: Info
  let p0=`<div class="mname">${p.name}</div><div class="maddr">📍 ${p.addr}</div>`;
  if(p.rating){
    const s=Math.round(Number(p.rating));
    p0+=`<div class="mrating"><span class="stars">${'★'.repeat(s)}${'☆'.repeat(5-s)} ${p.rating}</span><span class="rcnt">${p.reviews?' ('+p.reviews+' รีวิว)':''}</span></div>`;
  }
  if(p.price||p.dist){
    p0+='<div class="sgrid">';
    if(p.price) p0+=`<div class="scard"><div class="slbl">💰 ค่าเช่า</div><div class="sval" style="color:${bc}">฿${p.price}</div><div class="ssub">บาท/เดือน</div></div>`;
    if(p.dist) p0+=`<div class="scard"><div class="slbl">📏 ระยะทาง</div><div class="sval">${p.dist}</div><div class="ssub">จากมหาลัย</div></div>`;
    p0+='</div>';
  }
  if(p.elec&&p.elec!=='สอบถาม') p0+=`<div class="irow"><span class="ilbl">⚡ ค่าไฟ</span><span class="ival">${p.elec}</span></div>`;
  if(p.water&&p.water!=='สอบถาม') p0+=`<div class="irow"><span class="ilbl">💧 ค่าน้ำ</span><span class="ival">${p.water}</span></div>`;
  if(p.phone&&p.phone!=='-'&&p.phone!=='สอบถาม') p0+=`<div class="irow"><span class="ilbl">📞 ติดต่อ</span><span class="ival">${p.phone}</span></div>`;
  if(p.amenities&&p.amenities.length){
    p0+='<div class="sec-lbl">✨ สิ่งอำนวยความสะดวก</div><div class="tags">';
    p0+=p.amenities.map(a=>`<span class="tag">✓ ${a}</span>`).join('');
    p0+='</div>';
  }
  if(p.nearby&&p.nearby.length){
    p0+='<div class="sec-lbl">📍 สถานที่ใกล้เคียง</div><div class="tags">';
    p0+=p.nearby.map(n=>`<span class="tag" style="border-color:rgba(252,211,77,.25);color:#fcd34d">📌 ${n}</span>`).join('');
    p0+='</div>';
  }

  // Panel 1: Grab + Transport
  let p1='';
  if(p.distKm>0) p1+=grabHTML(p.distKm);
  if(p.transport&&p.transport.length){
    p1+='<div class="sec-lbl">🚌 รถสาธารณะ / วินมอเตอร์ไซค์</div>';
    p1+=p.transport.map(t=>`
      <div class="busitem">
        <div class="busnum" style="background:${t.col}22;color:${t.col}">${t.num}</div>
        <div><div class="busroute">${t.text}</div><div class="busfreq">⏱ ${t.freq}</div></div>
      </div>`).join('');
  } else if(p.distKm===0){
    p1+='<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">📍 อยู่ที่มหาวิทยาลัย ไม่ต้องเดินทาง</div>';
  }

  // Panel 2: Reviews
  let p2='';
  if(p.rv&&p.rv.length){
    p2=p.rv.map(r=>`
      <div class="revcard">
        <div class="revhead">
          <div class="avt" style="background:${r.c}22;color:${r.c}">${r.n[0]}</div>
          <div><div class="rvname">${r.n}</div><div class="rvdate">${r.d}</div></div>
        </div>
        <div class="rvstars">${'★'.repeat(r.s)}${'☆'.repeat(5-r.s)}</div>
        <div class="rvtext">${r.t}</div>
      </div>`).join('');
  } else p2='<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">⭐ ยังไม่มีรีวิว</div>';

  document.getElementById('mbody').innerHTML=
    `<div class="tpanel on" id="tp0">${p0}</div><div class="tpanel" id="tp1">${p1}</div><div class="tpanel" id="tp2">${p2}</div>`;
  document.getElementById('mover').classList.add('open');
}

function swTab(i,btn){
  sTab();
  document.querySelectorAll('.mtab').forEach((b,j)=>b.classList.toggle('on',j===i));
  document.querySelectorAll('.tpanel').forEach((p,j)=>p.classList.toggle('on',j===i));
}
function closeMdlBtn(){sClose();document.getElementById('mover').classList.remove('open');}
function closeMdlOv(e){if(e.target===document.getElementById('mover'))closeMdlBtn();}
</script>
